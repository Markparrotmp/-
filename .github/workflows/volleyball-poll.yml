name: Волейбольный опрос

# Ежедневный опрос теперь отправляет бот на VPS (bot.py, служба volleybot),
# поэтому расписание здесь ОТКЛЮЧЕНО — иначе опрос приходил бы дважды.
# Осталась только кнопка ручного запуска (Actions -> Run workflow) как запасной
# вариант. Если VPS пропадёт, верни блок:
#   schedule:
#     - cron: "0 9 * * *"   # 12:00 МСК (время в UTC, Москва = UTC+3)
on:
  workflow_dispatch: {}

jobs:
  send-poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Отправить опрос
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python send_poll.py
