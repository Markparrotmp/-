name: Daily compliment

# Ежедневную отправку делает сервер (systemd-таймер, см. compliment-bot/setup.sh).
# Этот workflow оставлен только для ручного теста из вкладки Actions.
on:
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r compliment-bot/requirements.txt

      - name: Send compliment
        working-directory: compliment-bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.COMPLIMENT_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.COMPLIMENT_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HER_NAME: ${{ vars.HER_NAME }}
        run: python send_compliment.py
